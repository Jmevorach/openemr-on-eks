# OpenEMR Monitoring Stack Configuration
# Generated: Thu Jul  2 21:31:47 EDT 2026

grafana:
  enabled: true
  adminUser: admin
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    storageClassName: gp3-monitoring-encrypted
    size: 20Gi
    accessModes: ["ReadWriteOncePod"]

  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      folderAnnotation: grafana_folder
      searchNamespace: ALL
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: ALL

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
      serve_from_sub_path: false
    security:
      admin_user: admin
    tracing:
      enabled: false
      disable_gravatar: true
      cookie_secure: true
      cookie_samesite: strict
    analytics:
      reporting_enabled: false
      check_for_updates: false
    log:
      level: info
    unified_alerting:
      enabled: true
    tracing:
      enabled: true
      tempo:
        address: "tempo-distributor.monitoring.svc.cluster.local:4317"
        auth_type: ""

prometheus:
  prometheusSpec:
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleSelector: {}
    ruleNamespaceSelector: {}

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3-monitoring-encrypted
          accessModes: ["ReadWriteOncePod"]
          resources: { requests: { storage: 100Gi } }

    resources:
      requests: { cpu: 500m, memory: 2Gi }
      limits:   { cpu: 2000m, memory: 4Gi }

    replicas: 1
    retention: 30d
    retentionSize: 90GB

    securityContext:
      runAsUser: 1000
      runAsGroup: 3000
      fsGroup: 2000

    additionalScrapeConfigs: []
    remoteWrite:
      - url: http://mimir-gateway.monitoring.svc.cluster.local:8080/api/v1/push
        queueConfig:
          maxSamplesPerSend: 1000
          batchSendDeadline: 5s
          maxRetries: 3
          minBackoff: 30ms
          maxBackoff: 100ms
    evaluationInterval: 30s
    scrapeInterval: 30s

  prometheus:
    prometheusSpec:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80

# alertmanager: using chart defaults (no custom config)

nodeExporter: { enabled: true }
kubeStateMetrics: { enabled: true }

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

kubeEtcd:             { enabled: false }
kubeScheduler:        { enabled: false }
kubeProxy:            { enabled: false }
kubeControllerManager:{ enabled: false }
prometheusOperator:
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
