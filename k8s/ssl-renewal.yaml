# =============================================================================
# OpenEMR SSL Certificate Renewal Automation
# =============================================================================
# This file configures automatic SSL certificate renewal for OpenEMR.
#
# SSL Renewal Strategy:
# - Self-signed certificate generation every 2 days
# - Atomic certificate replacement to prevent service disruption
# - Backup and cleanup of old certificates
# - Proper permissions and ownership
#
# Mount openemr-ssl-pvc at /mnt/ssl-efs (not /etc/ssl) so openssl.cnf remains
# available from the container image during renewal (same pattern as bootstrap).
# =============================================================================

# SSL Certificate Renewal CronJob
# Automatically generates and installs new self-signed certificates
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ssl-cert-renewal
  namespace: openemr
  labels:
    app: ssl-cert-renewal
    component: automation
spec:
  # Schedule: Run every 2 days at 2 AM UTC
  # This ensures certificates are always fresh and reduces browser warnings
  schedule: "0 2 */2 * *"
  concurrencyPolicy: Forbid             # Prevent overlapping renewal jobs
  startingDeadlineSeconds: 86400        # 24h window to start missed jobs after downtime
  successfulJobsHistoryLimit: 3         # Keep history of successful renewals
  failedJobsHistoryLimit: 3             # Keep history of failed renewals for debugging
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ssl-cert-renewal
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: openemr-sa
          containers:
          # SSL Renewal Container
          # Uses OpenEMR image to ensure compatibility with existing certificates
          - name: ssl-renewal
            image: openemr/openemr:${OPENEMR_VERSION}
            imagePullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false # Security: prevent privilege escalation
              readOnlyRootFilesystem: false   # Allow writing to SSL directories
              runAsNonRoot: false             # Required for SSL certificate operations
              runAsUser: 0                    # Run as root for certificate management
              capabilities:
                drop:
                - ALL                          # Drop all capabilities by default
                add:
                - CHOWN        # Required for changing file ownership
                - SETUID       # Required for user ID operations
                - SETGID       # Required for group ID operations
                - FOWNER       # Required for file ownership changes
                - DAC_OVERRIDE # Required for permission overrides
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -e
              SSL_ROOT=/mnt/ssl-efs
              echo "=== Starting SSL Certificate Renewal ==="
              echo "Timestamp: $(date)"

              mkdir -p "$SSL_ROOT/certs" "$SSL_ROOT/private" "$SSL_ROOT/apache2"

              OPENSSL_CNF=""
              for c in /etc/ssl/openssl.cnf /etc/pki/tls/openssl.cnf /usr/lib/ssl/openssl.cnf; do
                [ -f "$c" ] && OPENSSL_CNF="$c" && break
              done
              if [ -z "$OPENSSL_CNF" ]; then
                OPENSSL_CNF=$(find /usr /etc -name 'openssl.cnf' 2>/dev/null | head -1)
              fi
              if [ -z "$OPENSSL_CNF" ] || [ ! -f "$OPENSSL_CNF" ]; then
                echo "Could not locate openssl.cnf" >&2
                exit 1
              fi
              cp "$OPENSSL_CNF" "$SSL_ROOT/openssl.cnf"
              export OPENSSL_CONF="$SSL_ROOT/openssl.cnf"

              if [ -f "$SSL_ROOT/certs/selfsigned.cert.pem" ]; then
                echo "=== Backing up existing certificates ==="
                cp "$SSL_ROOT/certs/selfsigned.cert.pem" "$SSL_ROOT/certs/selfsigned.cert.pem.backup.$(date +%Y%m%d_%H%M%S)"
                cp "$SSL_ROOT/private/selfsigned.key.pem" "$SSL_ROOT/private/selfsigned.key.pem.backup.$(date +%Y%m%d_%H%M%S)"
              fi

              echo "=== Generating new SSL certificates ==="
              openssl req -x509 -newkey rsa:2048 -nodes \
                -keyout "$SSL_ROOT/private/selfsigned.key.pem.new" \
                -out "$SSL_ROOT/certs/selfsigned.cert.pem.new" \
                -days 365 -subj "/CN=openemr.local/O=OpenEMR"

              echo "=== Verifying new certificates ==="
              openssl x509 -in "$SSL_ROOT/certs/selfsigned.cert.pem.new" -text -noout | head -20

              echo "=== Installing new certificates ==="
              mv "$SSL_ROOT/private/selfsigned.key.pem.new" "$SSL_ROOT/private/selfsigned.key.pem"
              mv "$SSL_ROOT/certs/selfsigned.cert.pem.new" "$SSL_ROOT/certs/selfsigned.cert.pem"

              cd "$SSL_ROOT/certs" && ln -sf selfsigned.cert.pem webserver.cert.pem
              cd "$SSL_ROOT/private" && ln -sf selfsigned.key.pem webserver.key.pem
              ln -sf ../certs/selfsigned.cert.pem "$SSL_ROOT/apache2/server.pem"
              ln -sf ../private/selfsigned.key.pem "$SSL_ROOT/apache2/server.key"

              echo "SSL certificates renewed on $(date)" > "$SSL_ROOT/docker-selfsigned-configured"

              chown -R apache:apache "$SSL_ROOT/"
              chmod 600 "$SSL_ROOT/private/"*
              chmod 644 "$SSL_ROOT/certs/"*

              echo "=== Cleaning up old certificate backups ==="
              cd "$SSL_ROOT/certs/"
              ls -t selfsigned.cert.pem.backup.* 2>/dev/null | tail -n +6 | xargs rm -f || true
              cd "$SSL_ROOT/private/"
              ls -t selfsigned.key.pem.backup.* 2>/dev/null | tail -n +6 | xargs rm -f || true

              echo "=== SSL Certificate Renewal Complete ==="
              echo "New certificate valid until: $(openssl x509 -in "$SSL_ROOT/certs/selfsigned.cert.pem" -noout -enddate)"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            volumeMounts:
            - name: openemr-ssl
              mountPath: /mnt/ssl-efs
          volumes:
          - name: openemr-ssl
            persistentVolumeClaim:
              claimName: openemr-ssl-pvc
          # EKS Auto Mode handles node selection automatically
          tolerations:
          - key: "CriticalAddonsOnly"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "eks.amazonaws.com/compute-type"
            operator: "Equal"
            value: "auto-mode"
            effect: "NoSchedule"
---
# Optional: Create a one-time job to test SSL renewal immediately
apiVersion: batch/v1
kind: Job
metadata:
  name: ssl-cert-renewal-test
  namespace: openemr
  labels:
    app: ssl-cert-renewal-test
spec:
  template:
    metadata:
      labels:
        app: ssl-cert-renewal-test
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: openemr-sa
      containers:
      - name: ssl-renewal-test
        image: openemr/openemr:${OPENEMR_VERSION}
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
          capabilities:
            drop:
            - ALL
            add:
            - CHOWN
            - SETUID
            - SETGID
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          SSL_ROOT=/mnt/ssl-efs
          echo "=== SSL Certificate Renewal Test ==="
          echo "Current certificate info:"
          if [ -f "$SSL_ROOT/certs/selfsigned.cert.pem" ]; then
            openssl x509 -in "$SSL_ROOT/certs/selfsigned.cert.pem" -noout -dates
          else
            echo "No existing certificate found on openemr-ssl-pvc"
          fi

          echo "=== Test completed successfully ==="
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: openemr-ssl
          mountPath: /mnt/ssl-efs
      volumes:
      - name: openemr-ssl
        persistentVolumeClaim:
          claimName: openemr-ssl-pvc
      tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "eks.amazonaws.com/compute-type"
        operator: "Equal"
        value: "auto-mode"
        effect: "NoSchedule"
